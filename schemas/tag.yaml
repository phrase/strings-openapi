---
tag:
  type: object
  title: tag
  properties:
    name:
      type: string
    keys_count:
      type: integer
    system_tag:
      type: boolean
      description: |
        `true` when the tag was created automatically by the system (e.g. for jobs, uploads, or Figma attachments) rather than by a user.
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  example:
    name: my-feature
    keys_count: 8
    created_at: '2015-01-28T09:52:53Z'
    updated_at: '2015-01-28T09:52:53Z'
