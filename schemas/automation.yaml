---
automation:
  type: object
  title: automation
  properties:
    id:
      type: string
    name:
      type: string
    status:
      type: string
      enum: [inactive, active, error]
    trigger:
      type: string
      enum: [schedule, upload]
    status_filters:
      description: translation key statuses used to filter keys that are added to jobs
      type: array
      items:
        type: string
        enum: [unverified, untranslated, ready_for_review]
    project_id:
      type: string
    project_ids:
      type: array
      description: All project IDs the automation applies to. Returned alongside the singular `project_id` for backwards compatibility.
      items:
        type: string
    job_template_id:
      type: string
    job_owner_id:
      type: string
      description: User ID of the job owner that newly created jobs are assigned to.
      nullable: true
    include_only_updated_locales:
      type: boolean
      description: When `true`, the automation only acts on locales that changed since its last run.
    tags:
      type: array
      items:
        type: string
    cron_schedule:
      type: string
    time_zone:
      type: string
    account:
      "$ref": "./account.yaml#/account"
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  example:
    id: abcd1234cdef1234abcd1234cdef1234
    name: My First Automation
    status: active
    trigger: schedule
    status_filters:
      - unverified
      - untranslated
      - ready_for_review
    project_id: abcd1234cdef1234abcd1234cdef1234
    job_template_id: abcd1234cdef1234abcd1234cdef1234
    tags:
      - tag-1
      - tag-2
    cron_schedule: 00 13 * * 1,2
    time_zone: GMT
    account: account
    created_at: '2021-06-28T09:52:53Z'
    updated_at: '2021-06-28T09:52:53Z'
