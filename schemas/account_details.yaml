---
account_details:
  allOf:
  - "$ref": "./account.yaml#/account"
  - type: object
    title: account_details
    properties:
      subscription:
        "$ref": "./subscription.yaml#/subscription"
      slug:
        type: string
      roles:
        type: array
        description: |
          Roles the requesting user holds in the account.
        items:
          type: string
    example:
      slug: company-account
      subscription: subscription
      roles: [Owner, Admin]
