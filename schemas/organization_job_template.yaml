---
organization_job_template:
  type: object
  title: organization_job_template
  properties:
    id:
      type: string
    name:
      type: string
    briefing:
      type: string
    autotranslate_enabled:
      type: boolean
      description: |
        When `true`, jobs created from this template are auto-translated on creation. Maps to the `autotranslate` field on the request body.
    source_locale_id:
      type: string
      description: |
        Optional. ID of the source locale used by jobs created from this template. When omitted, the project's default source locale is used.
      nullable: true
    created_at:
      type: string
      format: date-time
    updated_at:
      type: string
      format: date-time
  example:
    id: 626ea67628690c73ac86ac81eec2d185
    name: template
    briefing: text
    created_at: "2017-01-28T09:52:53Z"
    updated_at: "2017-01-28T09:52:53Z"