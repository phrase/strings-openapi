---
repo_sync:
  type: object
  title: repo_sync
  properties:
    id:
      type: string
    project:
      "$ref": "./project_short.yaml#/project_short"
    git_provider:
      type: string
      enum:
        - github
        - gitlab
        - bitbucket
      description: The git provider this sync is connected to. Carries the same value as `provider`; `provider` is retained for backward compatibility.
      example: github
    provider:
      type: string
      enum:
        - github
        - gitlab
        - bitbucket
      description: The git provider this sync is connected to. Use `git_provider` going forward; both fields carry the same value.
    enabled:
      type: boolean
    auto_import:
      type: boolean
    repo_name:
      type: string
    pr_branch:
      type: string
      description: |
        Branch used as the source of exports/PRs. May be `null` when the sync is configured to push directly to `base_branch`.
      nullable: true
    created_at:
      type: string
      format: date-time
    last_import_at:
      type: string
      format: date-time
    last_export_at:
      type: string
      format: date-time
  required:
    - id
    - git_provider
    - provider
    - enabled
    - auto_import
  example:
    id: abcd1234cdef1234abcd1234cdef1234
    project:
      id: abcd1234cdef1234abcd1234cdef1234
      name: My Android Project
      main_format: xml
      created_at: '2015-01-28T09:52:53Z'
      updated_at: '2015-01-28T09:52:53Z'
    git_provider: github
    provider: github
    enabled: true
    auto_import: true
    repo_name: organization/repo
    created_at: '2015-01-28T09:52:53Z'
    last_import_at: '2015-01-28T09:52:53Z'
    last_export_at: '2015-01-28T09:52:53Z'
