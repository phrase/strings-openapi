summary: List comments
description: List all comments for a key.
operationId: comments/list
tags:
  - Comments
parameters:
  - "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
  - "$ref": "../../parameters.yaml#/project_id"
  - "$ref": "../../parameters.yaml#/key_id"
  - "$ref": "../../parameters.yaml#/page"
  - "$ref": "../../parameters.yaml#/per_page"
  - description: specify the branch to use
    example: my-feature-branch
    name: branch
    in: query
    schema:
      type: string
  - description: Search query for comment messages
    example: Some comment content
    name: query
    in: query
    schema:
      type: string
  - description: Search comments by their assigned locales
    example: [someId]
    name: locale_ids
    in: query
    schema:
      type: array
      items:
        type: string
  - description: |-
      Specify the filter for the comments. Supported values are `read` and `unread`. Combine both to return all comments (read + unread) without filtering.
    name: filters
    in: query
    schema:
      type: array
      example: [read, unread]
      items:
        type: string
        enum:
          - read
          - unread
  - description: |-
      Order direction. Defaults to `desc`. Values other than `asc` and `desc` fall back to `desc`.
    name: order
    in: query
    example: desc
    schema:
      type: string
      enum:
        - asc
        - desc
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: array
          items:
            "$ref": "../../schemas/comment.yaml#/comment"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
      Link:
        "$ref": "../../headers.yaml#/Link"
      Pagination:
        "$ref": "../../headers.yaml#/Pagination"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `read` scope or when the requesting user is not allowed to list comments on this key.
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects/:project_id/keys/:key_id/comments?branch=my-feature-branch&filters=unread&query=something&locale_ids=someId&order=desc" \
        -u USERNAME_OR_ACCESS_TOKEN \
        -X GET \
        -H 'Content-Type: application/json'
x-cli-command: comments list
x-cli-version: '2.5'
