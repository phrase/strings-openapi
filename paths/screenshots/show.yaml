---
summary: Get a single screenshot
description: |
  Returns a single screenshot belonging to the specified project. Use this to retrieve the screenshot's name, description, hosted image URL, and marker count after uploading, or before creating, updating, or inspecting its markers. The response is a synchronous, idempotent read — repeated calls return the same record without side effects.

  The Attachable Screenshots feature must be enabled on the account.
operationId: screenshot/show
tags:
- Screenshots
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/id"
- description: specify the branch to use
  example: my-feature-branch
  name: branch
  in: query
  required: false
  schema:
    type: string
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          "$ref": "../../schemas/screenshot.yaml#/screenshot"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
    description: "BAD_REQUEST: malformed request parameters."
  '401':
    "$ref": "../../responses.yaml#/401"
    description: "UNAUTHORIZED: missing or invalid access token."
  '403':
    "$ref": "../../responses.yaml#/403"
    description: "FORBIDDEN: the access token lacks the read scope, the requesting user does not have read access to the project, or the Attachable Screenshots feature is not enabled on the account."
  '404':
    "$ref": "../../responses.yaml#/404"
    description: "NOT_FOUND: the project or screenshot does not exist under the given identifiers."
  '429':
    "$ref": "../../responses.yaml#/429"
    description: "RATE_LIMIT_EXCEEDED: too many requests. Wait for the reset time indicated by X-Rate-Limit-Reset before retrying."
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/screenshots/:id" \
      -u USERNAME_OR_ACCESS_TOKEN
- lang: CLI v2
  source: |-
    phrase screenshots show \
    --project_id <project_id> \
    --id <id> \
    --access_token <token>
x-cli-version: '2.5'
