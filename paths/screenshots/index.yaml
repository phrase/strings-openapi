---
summary: List screenshots
description: |
  Returns all screenshots uploaded to the given project. Screenshots are UI images that provide visual context for translators, helping them understand where a translation string appears in the product interface.

  Use this endpoint to browse existing screenshots before creating markers, or to audit which screenshots belong to a project. Filtering by key_id narrows results to screenshots that have at least one marker linked to that key.

  Access requires the Attachable Screenshots feature to be enabled on the account and the read scope on the access token. The read-only scope is sufficient — write access is not required. When key_id is supplied and no key with that code exists in the project, the request returns 404.

  The X-PhraseApp-OTP header (One-Time Password) is optional and required only when the access token belongs to a user with two-factor authentication enforced at request time.

  Error codes follow the UPPER_SNAKE_CASE format (for example, FEATURE_UNAVAILABLE, INSUFFICIENT_SCOPE) and are returned in the message field of the error response body alongside a human-readable description.
operationId: screenshots/list
tags:
- Screenshots
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/page"
- "$ref": "../../parameters.yaml#/per_page"
- description: Branch to use instead of the project default branch. When omitted, results are scoped to the default branch.
  example: my-feature-branch
  name: branch
  in: query
  required: false
  schema:
    type: string
- description: Filter results to screenshots that have at least one marker linked to the translation key with this code. Must be a 32-character lowercase hexadecimal string matching a key in the project. Returns 404 when no key with this code exists.
  example: abcd1234cdef1234abcd1234cdef1234
  name: key_id
  in: query
  required: false
  schema:
    type: string
    pattern: "^[0-9a-f]{32}$"
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: array
          items:
            "$ref": "../../schemas/screenshot.yaml#/screenshot"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
      Link:
        "$ref": "../../headers.yaml#/Link"
      Pagination:
        "$ref": "../../headers.yaml#/Pagination"
  '400':
    "$ref": "../../responses.yaml#/400"
    description: >-
      Bad request. Returned when a supplied parameter value is invalid — for
      example when key_id does not match the required 32-character hexadecimal
      format. Correct the parameter value and retry the request.
  '401':
    "$ref": "../../responses.yaml#/401"
    description: >-
      Unauthorized. Returned when no valid access token is provided or the
      token has expired. Supply a valid access token in the Authorization
      header or as the access_token query parameter and retry.
  '403':
    "$ref": "../../responses.yaml#/403"
    description: >-
      Forbidden. Returned when the access token lacks the read scope, when
      the authenticated user does not have read permission on screenshots in
      this project, or when the Attachable Screenshots feature is not enabled
      on the account. Verify that the token has the read scope and that the
      feature is available on your subscription plan.
  '404':
    "$ref": "../../responses.yaml#/404"
  '429':
    "$ref": "../../responses.yaml#/429"
    description: >-
      Too many requests. Returned when the account or token rate limit has
      been exceeded. Wait until the time indicated by the X-Rate-Limit-Reset
      header before sending further requests.
x-code-samples:
