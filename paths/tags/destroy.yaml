---
summary: Delete a tag
description: Delete an existing tag.
operationId: tag/delete
tags:
- Tags
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/name"
- description: specify the branch to use
  example: my-feature-branch
  name: branch
  in: query
  schema:
    type: string
responses:
  '204':
    "$ref": "../../responses.yaml#/204"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope or when the requesting user is not allowed to delete this tag.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/tags/:name" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X DELETE \
      -d '{"branch":"my-feature-branch"}' \
      -H 'Content-Type: application/json'
x-cli-command: tags delete
x-cli-version: '2.5'
