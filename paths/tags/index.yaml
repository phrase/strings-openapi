summary: List tags
description: List all tags for the given project.
operationId: tags/list
tags:
  - Tags
parameters:
  - "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
  - "$ref": "../../parameters.yaml#/project_id"
  - "$ref": "../../parameters.yaml#/page"
  - "$ref": "../../parameters.yaml#/per_page"
  - description: Excludes tags generated by the system, e.g. job, upload or figma tags. Mutually exclusive with `only_system_tags`.
    name: exclude_system_tags
    example: true
    in: query
    schema:
      type: boolean
  - description: Returns only system-generated tags (e.g. job, upload, figma) and excludes user-defined tags. Mutually exclusive with `exclude_system_tags`.
    name: only_system_tags
    example: false
    in: query
    schema:
      type: boolean
  - description: specify the branch to use
    example: my-feature-branch
    name: branch
    in: query
    schema:
      type: string
  - description: Specify a query to filter tags by name.
    example: feature
    name: q
    in: query
    schema:
      type: string
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: array
          items:
            "$ref": "../../schemas/tag.yaml#/tag"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
      Link:
        "$ref": "../../headers.yaml#/Link"
      Pagination:
        "$ref": "../../headers.yaml#/Pagination"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `read` scope or when the requesting user is not allowed to list tags in this project.
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects/:project_id/tags?branch=my-feature-branch" \
        -u USERNAME_OR_ACCESS_TOKEN
  - "$ref": "../../examples/cli.yaml#/TagsList"
x-cli-command: tags list
x-cli-version: '2.5'
