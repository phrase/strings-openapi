summary: Batch unlink child keys from a parent key
description: |
  Removes one or more child keys from a parent key's linked-key group, or dissolves the entire group by setting unlink_parent to true.

  Use this when you need to detach specific child keys from a shared translation source, or to fully break apart a linked-key group so each key manages its own translations independently. When child keys are unlinked, their translations are updated with a copy of the parent's current content (strategy keep_content, the default) or cleared (strategy remove_content).

  This operation is only available on main projects. Error codes follow UPPER_SNAKE_CASE format throughout this API.
operationId: key_links/batch_destroy
tags:
- Linked Keys
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/key_id_as_id"
requestBody:
  required: false
  content:
    application/json:
      schema:
        required:
        - child_key_ids
        type: object
        title: key_links/batch_destroy/parameters
        properties:
          child_key_ids:
            description: Codes of the child keys to unlink. Required when unlink_parent is false or omitted. Ignored when unlink_parent is true.
            type: array
            example: ["feature.subtitle", "nav.home"]
            items:
              type: string
              example: "feature.subtitle"
          unlink_parent:
            description: When true, dissolves the entire linked-key group by unlinking all children and removing the group. The child_key_ids field is ignored when this is set to true.
            type: boolean
            default: false
          strategy:
            type: string
            description: Controls what happens to child key translation content after unlinking. keep_content (default) copies the parent translation into each child; remove_content clears each child translation.
            enum:
            - keep_content
            - remove_content
            default: keep_content
responses:
  '200':
    description: Updated linked-key group reference after the unlink operation.
    content:
      application/json:
        schema:
          title: linked_keys_reference
          type: object
          properties:
            created_at:
              type: string
              format: date-time
              description: When the linked-key group was created.
            updated_at:
              type: string
              format: date-time
              description: When the linked-key group was last modified.
            created_by:
              type: object
              title: linked_keys_reference/created_by
              description: User who created the linked-key group.
              properties:
                id:
                  type: string
                  description: User identifier (code).
                username:
                  type: string
                name:
                  type: string
                gravatar_uid:
                  type: string
            updated_by:
              type: object
              title: linked_keys_reference/updated_by
              description: User who last modified the linked-key group.
              properties:
                id:
                  type: string
                  description: User identifier (code).
                username:
                  type: string
                name:
                  type: string
                gravatar_uid:
                  type: string
            account:
              type: object
              title: linked_keys_reference/account
              description: Account the linked-key group belongs to.
              properties:
                id:
                  type: string
                  description: Account identifier (code).
                name:
                  type: string
                slug:
                  type: string
                company:
                  type: string
                created_at:
                  type: string
                  format: date-time
                updated_at:
                  type: string
                  format: date-time
                company_logo_url:
                  type: string
                  format: uri
                  description: URL of the account company logo image.
            parent:
              type: object
              title: linked_keys_reference/parent
              description: The parent key that owns this linked-key group.
              properties:
                id:
                  type: string
                  description: Key identifier (code).
                name:
                  type: string
                plural:
                  type: boolean
                  description: Whether the key is pluralized.
                use_ordinal_rules:
                  type: boolean
                data_type:
                  type: string
                tags:
                  type: array
                  items:
                    type: string
            children:
              type: array
              description: Child keys remaining in the linked-key group after the operation. Empty when unlink_parent dissolves the group entirely.
              items:
                type: object
                title: linked_keys_reference/child
                properties:
                  id:
                    type: string
                    description: Key identifier (code).
                  name:
                    type: string
                  plural:
                    type: boolean
                    description: Whether the key is pluralized.
                  use_ordinal_rules:
                    type: boolean
                  data_type:
                    type: string
                  tags:
                    type: array
                    items:
                      type: string
        example:
          created_at: "2024-03-15T10:30:00.000Z"
          updated_at: "2024-03-15T12:45:00.000Z"
          created_by:
            id: "abcd1234efgh5678"
            username: "alice"
            name: "Alice Smith"
            gravatar_uid: "efgh5678abcd1234"
          updated_by:
            id: "ijkl9012mnop3456"
            username: "bob"
            name: "Bob Jones"
            gravatar_uid: "mnop3456ijkl9012"
          account:
            id: "qrst7890uvwx1234"
            name: "Acme Corp"
            slug: "acme-corp"
            company: "Acme Corporation"
            created_at: "2023-01-01T00:00:00.000Z"
            updated_at: "2024-03-15T12:45:00.000Z"
            company_logo_url: "https://assets.phrase.com/accounts/acme-corp/logo.png"
          parent:
            id: "main.title"
            name: "main.title"
            plural: false
            use_ordinal_rules: false
            data_type: "string"
            tags: ["ui", "homepage"]
          children:
            - id: "feature.subtitle"
              name: "feature.subtitle"
              plural: false
              use_ordinal_rules: false
              data_type: "string"
              tags: []
  '400':
    "$ref": "../../responses.yaml#/400"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
  '404':
    "$ref": "../../responses.yaml#/404"
  '422':
    description: |
      Returned when validation fails. All error codes follow UPPER_SNAKE_CASE format.

      Common codes:
      - KEY_IS_NOT_LINKED: a key in child_key_ids is not currently linked to the specified parent key. Verify the child key codes and the parent key before retrying.
      - CREATING_OR_UPDATING_TRANSLATION_ERROR: a translation update for an unlinked child key failed. Retry the request; if the error persists, verify that the child key's translations are not locked or in a state that prevents edits.
    content:
      application/json:
        schema:
          type: object
          title: key_links/batch_destroy/error
          properties:
            message:
              type: string
              description: Human-readable error summary.
            errors:
              type: array
              items:
                type: object
                title: key_links/batch_destroy/error_item
                properties:
                  resource:
                    type: string
                  field:
                    type: string
                  message:
                    type: string
                  code:
                    type: string
                    description: Machine-readable UPPER_SNAKE_CASE error code identifying the failure reason.
                    enum:
                    - KEY_IS_NOT_LINKED
                    - CREATING_OR_UPDATING_TRANSLATION_ERROR
        example:
          message: "Validation failed"
          errors:
            - resource: "base"
              field: ""
              message: "Key feature.subtitle is not linked to main.title"
              code: "KEY_IS_NOT_LINKED"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects/:project_id/keys/:id/key_links" \
        -u USERNAME_OR_ACCESS_TOKEN \
        -X DELETE \
        -H "Content-Type: application/json" \
        -d '{"child_key_ids": ["feature.subtitle", "nav.home"], "strategy": "keep_content"}'
