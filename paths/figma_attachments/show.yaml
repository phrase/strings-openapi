---
summary: Get a single Figma attachment
description: Get details on a single Figma attachment for a given project.
operationId: figma_attachment/show
tags:
  - Figma attachments
parameters:
  - "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
  - "$ref": "../../parameters.yaml#/project_id"
  - "$ref": "../../parameters.yaml#/id"
  - description: specify the branch to use
    example: my-feature-branch
    name: branch
    in: query
    schema:
      type: string
responses:
  "200":
    description: OK
    content:
      application/json:
        schema:
          "$ref": "../../schemas/figma_attachment.yaml#/figma_attachment"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  "400":
    "$ref": "../../responses.yaml#/400"
  "404":
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `read` scope, when the requesting user is not allowed to read this Figma attachment, or when the account does not have the Attachable Screenshots feature.
  "429":
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects/:project_id/figma_attachments/:id?branch=my-feature-branch" \
        -X GET \
        -u USERNAME_OR_ACCESS_TOKEN
  - lang: CLI v2
    source: |-
      phrase figma_attachment show \
      --project_id <project_id> \
      --id <id> \
      --branch my-feature-branch \
      --access_token <token>
x-cli-version: "2.13"
