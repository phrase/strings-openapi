---
summary: Delete a Figma attachment
description: Delete an existing Figma attachment.
operationId: figma_attachment/delete
tags:
  - Figma attachments
parameters:
  - "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
  - "$ref": "../../parameters.yaml#/project_id"
  - "$ref": "../../parameters.yaml#/id"
  - description: specify the branch to use
    example: my-feature-branch
    name: branch
    in: query
    schema:
      type: string
responses:
  "204":
    "$ref": "../../responses.yaml#/204"
  "400":
    "$ref": "../../responses.yaml#/400"
  "404":
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the requesting user is not allowed to delete this Figma attachment, or when the account does not have the Attachable Screenshots feature.
  '422':
    "$ref": "../../responses.yaml#/422"
  "429":
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects/:project_id/figma_attachments/:id" \
        -u USERNAME_OR_ACCESS_TOKEN \
        -X DELETE \
        -d '{"branch":"my-feature-branch"}' \
        -H 'Content-Type: application/json'
  - lang: CLI v2
    source: |-
      phrase figma_attachment delete \
      --project_id <project_id> \
      --id <id> \
      --branch my-feature-branch \
      --access_token <token>
x-cli-version: "2.13"
