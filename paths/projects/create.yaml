---
summary: Create a project
description: |
  Create a new project in the given account.

  When `source_project_id` is supplied, the new project is created as a clone of that project. All locales, keys, and translations are copied asynchronously after the response is returned, so they may not be available immediately. Settings from the source project are inherited unless explicitly overridden in the request; in clone mode, the `shares_translation_memory` field is ignored and inherited from the source.

  `shares_translation_memory` defaults to `true` when omitted on a non-clone create.
operationId: project/create
tags:
  - Projects
parameters:
  - "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
responses:
  "201":
    description: Created
    content:
      application/json:
        schema:
          "$ref": "../../schemas/project_details.yaml#/project_details"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  "400":
    "$ref": "../../responses.yaml#/400"
  "401":
    "$ref": "../../responses.yaml#/401"
  "403":
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope or when the requesting user is not allowed to create projects in the target account.
  "404":
    "$ref": "../../responses.yaml#/404"
  "422":
    "$ref": "../../responses.yaml#/422"
  "429":
    "$ref": "../../responses.yaml#/429"
x-code-samples:
  - lang: Curl
    source: |-
      curl "https://api.phrase.com/v2/projects" \
        -u USERNAME_OR_ACCESS_TOKEN \
        -X POST \
        -F name=My%20Android%20Project \
        -F main_format=yml \
        -F shares_translation_memory=true
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: project/create/parameters
        required:
          - name
        properties:
          name:
            description: Name of the project
            type: string
            example: My Android Project
          main_format:
            description: Main file format specified by its API Extension name. Used for locale downloads if no format is specified. For API Extension names of available file formats see [Format Guide](https://support.phrase.com/hc/en-us/sections/6111343326364) or our [Formats API Endpoint](/en/api/strings/formats/list-formats).
            type: string
            example: yml
          media:
            description: "(Optional) Main technology stack used in the project. It affects for example the suggested placeholder style. Predefined values include:
              `Ruby`, `JavaScript`, `AngularJS`, `React`, `iOS`, `Android`, `Python`, `PHP`, `Java`, `Go`, `Windows Phone`, `Rails`, `Node.js`, `.NET`, `Django`,
              `Symfony`, `Yii Framework`, `Zend Framework`, `Apple App Store Description`, `Google Play Description`, but it can also take any other value."
            type: string
            example: Python
          shares_translation_memory:
            description: Indicates whether the project should share the account's translation memory
            type: boolean
            example: true
          project_image:
            description: Image to identify the project
            type: string
            format: binary
            example: "/path/to/my/project-screenshot.png"
          remove_project_image:
            description: Indicates whether the project image should be deleted.
            type: boolean
            example:
          account_id:
            description: Account ID to specify the actual account the project should be created in. Required if the requesting user is a member of multiple accounts.
            type: string
            example: abcd1234
          point_of_contact:
            description:  (Optional) User ID of the point of contact for the project.
            type: string
            example: abcd1234
          source_project_id:
            description: When a source project ID is given, a clone of that project will be created, including all locales, keys and translations as well as the main project settings if they are not defined otherwise through the params.
            type: string
            example: abcd1234
          workflow:
            description: (Optional) Review Workflow. "simple" / "review". [Read more](https://support.phrase.com/hc/en-us/articles/5784094755484)
            type: string
            example: review
          machine_translation_enabled:
            description: "(Optional) Enable machine translation support in the project. Required for Pre-Translation"
            type: boolean
            example: true
          enable_branching:
            description: "(Optional) Enable branching in the project"
            type: boolean
            example: true
          protect_master_branch:
            description: "(Optional) Protect the master branch in project where branching is enabled"
            type: boolean
            example: true
          enable_all_data_type_translation_keys_for_translators:
            description: "(Optional) Otherwise, translators are not allowed to edit translations other than strings"
            type: boolean
            example: true
          enable_icu_message_format:
            description: (Optional) We can validate and highlight your ICU messages. [Read more](https://support.phrase.com/hc/en-us/articles/5822319545116)
            type: boolean
            example: true
          zero_plural_form_enabled:
            description: "(Optional) Displays the input fields for the 'ZERO' plural form for every key as well although only some languages require the 'ZERO' explicitly."
            type: boolean
            example: true
          autotranslate_enabled:
            description: (Optional) Autopilot, requires machine_translation_enabled. [Read more](https://support.phrase.com/hc/en-us/articles/5822187934364)
            type: boolean
            example: true
          autotranslate_check_new_translation_keys:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_check_new_uploads:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_check_new_locales:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_mark_as_unverified:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_use_machine_translation:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_use_translation_memory:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autotranslate_overwrite_unverified_translations:
            description: "(Optional) Requires autotranslate_enabled to be true"
            type: boolean
            example: true
          autocomplete_job_enabled:
            description: "(Optional) Enable autocomplete-job behavior so that newly created keys and locales are automatically added to in-progress jobs."
            type: boolean
            example: false
          job_locking_enabled:
            description: "(Optional) When enabled, translations are locked once a job moves into review."
            type: boolean
            example: false
          smart_suggest_enabled:
            description: "(Optional) Enable Smart Suggest for the project. Defaults to `true` when omitted."
            type: boolean
            example: true
          smart_suggest_use_glossary:
            description: "(Optional) Allow Smart Suggest to source suggestions from the project glossary. Defaults to `true` when omitted."
            type: boolean
            example: true
          smart_suggest_use_machine_translation:
            description: "(Optional) Allow Smart Suggest to source suggestions from machine translation. Defaults to `true` when omitted."
            type: boolean
            example: true
          translation_keys_sort_collation:
            description: "(Optional) Collation used when sorting translation keys alphabetically. Defaults to `unicode_ci` when omitted."
            type: string
            example: unicode_ci
          default_encoding:
            description: "(Optional) Sets the default encoding for Uploads. If you leave it empty, we will try to guess it automatically for you when you Upload a file. You can still override this value by setting the [`file_encoding`](/en/api/strings/uploads/upload-a-new-file) parameter for Uploads."
            type: string
            example: "UTF-8"
            enum:
              - "UTF-8"
              - "UTF-16"
              - "UTF-16BE"
              - "UTF-16LE"
              - "ISO-8859-1"
          cldr_version:
            description: "(Optional) CLDR plural-rule version used by the project."
            type: string
            example: "cldr48"
          placeholder_styles:
            description: "(Optional) List of placeholder styles enabled for the project."
            type: array
            items:
              type: string
            example:
              - "angular"
              - "iOS"
x-cli-command: projects create
x-cli-version: "2.6.3"
