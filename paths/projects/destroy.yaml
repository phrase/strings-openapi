---
summary: Delete a project
description: |
  Delete an existing project. Associated repository syncs and OTA distributions are removed. A `project:delete` event is dispatched.
operationId: project/delete
tags:
- Projects
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/id"
responses:
  '204':
    "$ref": "../../responses.yaml#/204"
  '400':
    "$ref": "../../responses.yaml#/400"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope or when the requesting user is not allowed to manage this project.
  '404':
    "$ref": "../../responses.yaml#/404"
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:id" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X DELETE
x-cli-command: projects delete
x-cli-version: '2.5'
