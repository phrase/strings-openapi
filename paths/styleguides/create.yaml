---
summary: Create a style guide
description: Create a new style guide.
operationId: styleguide/create
tags:
- Style guides
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          "$ref": "../../schemas/styleguide_details.yaml#/styleguide_details"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope or when the requesting user is not allowed to create style guides in this project.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/styleguides" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X POST \
      -d '{"title":"Web application style guide","audience":"customer-facing","target_audience":"teenager","grammatical_person":"first_person_singular","vocabulary_type":"technical","business":"We are a travel site that helps customers find the best hotels and flights.","company_branding":"ACME Inc. should never be translated.","formatting":"Never use capital letters","glossary_terms":"Apartment, cabin, loft","grammar_consistency":"Use informal pronouns and consistent present-tense conjugation","literal_translation":"Neutral","overall_tone":"Tone should be fun and light","samples":"http://www.myexample.com/my/document/path/to/samples.pdf"}' \
      -H 'Content-Type: application/json'
- "$ref": "../../examples/cli.yaml#/StyleguideCreate"
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: styleguide/create/parameters
        required:
          - title
        properties:
          title:
            description: Style guide title
            type: string
            example: Web application style guide
          audience:
            description: Audience description
            type: string
            example: customer-facing
          target_audience:
            description: Target audience for the translations.
            type: string
            enum:
              - not_specified
              - children
              - teenager
              - young_adults
              - adults
              - old_adults
            example: teenager
          grammatical_person:
            description: Preferred grammatical person.
            type: string
            enum:
              - not_specified
              - first_person_singular
              - second_person_singular
              - third_person_singular_masculine
              - third_person_singular_feminine
              - third_person_singular_neuter
              - first_person_plural
              - second_person_plural
              - third_person_plural
            example: first_person_singular
          vocabulary_type:
            description: Vocabulary register the translations should use.
            type: string
            enum:
              - not_specified
              - popular
              - technical
              - fictional
            example: technical
          business:
            description: Description of the business
            type: string
            example: We are a travel site that helps customers find the best hotels and flights.
          company_branding:
            description: Company branding to remain consistent.
            type: string
            example: ACME Inc. should never be translated.
          formatting:
            description: Formatting requirements and character limitations.
            type: string
            example: Never use capital letters
          glossary_terms:
            description: List of terms and/or phrases that need to be translated consistently.
            type: string
            example: Apartment, cabin, loft
          grammar_consistency:
            description: Formal or informal pronouns, consistent conjugation, grammatical gender
            type: string
            example: Use informal pronouns and consistent present-tense conjugation
          literal_translation:
            description: 'Can be one of: Cultural/Conversational, Literal, Neutral.'
            type: string
            example: Neutral
          overall_tone:
            description: Tone requirement descriptions
            type: string
            example: Tone should be fun and light
          samples:
            description: Provide links to sample product pages, FAQ pages, etc. to give the translator a point of reference. You can also provide past translations. Even snippets or short paragraphs are helpful for maintaining consistency.
            type: string
            example: http://www.myexample.com/my/document/path/to/samples.pdf
x-cli-command: style_guides create
x-cli-version: '2.5'
