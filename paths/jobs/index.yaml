---
summary: List jobs
description: List all jobs for the given project.
operationId: jobs/list
tags:
- Jobs
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/page"
- "$ref": "../../parameters.yaml#/per_page"
- "$ref": "../../parameters.yaml#/branch"
- "$ref": "../../parameters.yaml#/job_owner"
- "$ref": "../../parameters.yaml#/job_assignee"
- "$ref": "../../parameters.yaml#/job_state"
- description: |-
    Filter by multiple job states at once. Accepted values are the same as `state`. When supplied, `state` is ignored. Rejected with `400 Bad Request` if any value is unknown.
  name: states
  in: query
  example:
    - in_progress
    - completed
  schema:
    type: array
    items:
      type: string
- description: |-
    Filter to jobs that include the translation key identified by this code (matches via the job's tags).
  name: key_id
  in: query
  example: abcd1234cdef1234abcd1234cdef1234
  schema:
    type: string
- "$ref": "../../parameters.yaml#/job_updated_since"
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: array
          items:
            "$ref": "../../schemas/job.yaml#/job"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
      Link:
        "$ref": "../../headers.yaml#/Link"
      Pagination:
        "$ref": "../../headers.yaml#/Pagination"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `read` scope or when the requesting user is not allowed to list jobs in this project.
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/jobs?branch=my-feature-branch&owned_by=abcd1234cdef1234abcd1234cdef1234&assigned_to=abcd1234cdef1234abcd1234cdef1234&state=completed" \
      -u USERNAME_OR_ACCESS_TOKEN
x-cli-command: jobs list
x-cli-version: '2.5'
