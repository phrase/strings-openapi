---
summary: Update an organization job template
description: Update an existing organization job template.
operationId: organization_job_template/update
tags:
- Organization Job Templates
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/account_id"
- "$ref": "../../parameters.yaml#/id"
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          "$ref": "../../schemas/organization_job_template_details.yaml#/organization_job_template_details"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the requesting user is not allowed to update this organization job template, or when the account does not have the Job Templates feature.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/accounts/:account_id/job_templates/:id" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X PATCH \
      -H 'Content-Type: application/json'
- "$ref": "../../examples/cli.yaml#/OrganizationJobTemplateUpdate"
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: organization_job_template/update/parameters
        properties:
          name:
            description: Job template name
            type: string
            example: template
          briefing:
            description: Briefing for the translators
            type: string
            example: text
          autotranslate:
            description: Automatically translate the job using machine translation.
            type: boolean
            example: true
        required:
        - name
x-cli-command: organization_job_templates update
x-cli-version: "2.7.0"
