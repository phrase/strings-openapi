---
summary: Create a translation for a term
description: 'Create a new translation for a term in a term base (previously: glossary).'
operationId: glossary_term_translation/create
tags:
- Glossary Term Translations
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/account_id"
- "$ref": "../../parameters.yaml#/glossary_id"
- "$ref": "../../parameters.yaml#/term_id"
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          "$ref": "../../schemas/glossary_term_translation.yaml#/glossary_term_translation"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the requesting user is not allowed to create translations on this glossary term, or when the account does not have the Glossary feature.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/accounts/:account_id/glossaries/:glossary_id/terms/:term_id/translations" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X POST \
      -d '{"locale_code":"en-US","content":"My translated term"}' \
      -H 'Content-Type: application/json'
- "$ref": "../../examples/cli.yaml#/GlossaryTermTranslationCreate"
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: glossary_term_translation/create/parameters
        required:
          - locale_code
          - content
        properties:
          locale_code:
            description: Identifies the language for this translation
            type: string
            example: en-US
          content:
            description: The content of the translation
            type: string
            example: My translated term
x-cli-command: glossary_term_translations create
x-cli-version: '2.5'
