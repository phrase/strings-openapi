---
summary: Sync a branch
description: |
  Pull changes from the base branch into this branch, applying the chosen conflict-resolution strategy.

  The sync runs asynchronously. The branch transitions to `syncing_branch` and settles back into `success` (or `merge_conflict` / `branch_error`) once the background job completes; the response body for this request is empty. Poll the branch resource to observe the final state.

  Only branches created with the newer branching system can be synced. Requests against branches from the older system, or against branches whose current state does not allow a sync, are rejected with `422 Unprocessable Entity` and an empty body.

  Requires the Branching feature to be enabled on the account.
operationId: branch/sync
tags:
- Branches
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/name"
responses:
  '200':
    description: OK. The sync has been scheduled. The response body is empty; observe progress by polling the branch resource.
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the user is not allowed to sync this branch, or when the Branching feature is not available on the account.
  '404':
    "$ref": "../../responses.yaml#/404"
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/branches/:name/sync" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X PATCH \
      -d '{"strategy":"use_main"}' \
      -H 'Content-Type: application/json'
- lang: CLI v2
  source: |-
    phrase branches sync \
    --project_id <project_id> \
    --name <name> \
    --data '{"strategy":"use_main"}' \
    --access_token <token>
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: branch/sync/parameters
        properties:
          strategy:
            description: |
              Conflict resolution strategy applied when the branch and its base have diverged. `use_main` keeps the values from the base branch; `use_branch` keeps the values from this branch.
            type: string
            enum:
              - use_main
              - use_branch
            example: use_main
