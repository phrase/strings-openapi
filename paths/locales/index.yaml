---
summary: List locales
description: List all locales for the given project.
operationId: locales/list
tags:
- Locales
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
- "$ref": "../../parameters.yaml#/page"
- "$ref": "../../parameters.yaml#/per_page"
- description: Sort locales. Valid options are "name_asc", "name_desc", "default_asc", "default_desc".
  example:
  name: sort_by
  in: query
  schema:
    type: string
- description: specify the branch to use
  example: my-feature-branch
  name: branch
  in: query
  schema:
    type: string
- description: Specify a query to filter locales. Currently supports `name` argument, filtering only locales with names starting with the given string.
  example: name:en
  name: q
  in: query
  schema:
    type: string
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          type: array
          items:
            "$ref": "../../schemas/locale.yaml#/locale"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
      Link:
        "$ref": "../../headers.yaml#/Link"
      Pagination:
        "$ref": "../../headers.yaml#/Pagination"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `read` scope or when the requesting user is not allowed to list locales in this project.
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/locales?branch=my-feature-branch" \
      -u USERNAME_OR_ACCESS_TOKEN
- "$ref": "../../examples/cli.yaml#/LocalesList"
x-cli-command: locales list
x-cli-version: '2.5'
