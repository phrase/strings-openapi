---
summary: Create a locale
description: >
  Create a new locale. Setting unverify_new_translations or
  unverify_updated_translations to true requires the advanced_workflows plan
  feature, otherwise the request returns 403. Setting main to true requires the
  verification_system plan feature. Returns 403 when the project is protected.
operationId: locale/create
tags:
- Locales
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/project_id"
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          "$ref": "../../schemas/locale_details.yaml#/locale_details"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
  '404':
    "$ref": "../../responses.yaml#/404"
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/projects/:project_id/locales" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X POST \
      -d '{"branch":"my-feature-branch","name":"de","code":"de-DE","source_locale_id":"abcd1234abcd1234abcd1234abcd1234", "fallback_locale_id":"abcd1234abcd1234abcd1234abcd1234"}' \
      -H 'Content-Type: application/json'
- lang: CLI v2
  source: |-
    phrase locales create \
    --project_id <project_id> \
    --data '{"branch":"my-feature-branch", "name":"de", "code":"de-DE", "source_locale_id":"abcd1234abcd1234abcd1234abcd1234", "fallback_locale_id":"abcd1234abcd1234abcd1234abcd1234"}' \
    --access_token <token>
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: locale/create/parameters
        required:
          - name
          - code
        properties:
          branch:
            description: specify the branch to use
            type: string
            example: my-feature-branch
          name:
            description: Locale name
            type: string
            example: de
          code:
            description: Locale ISO code
            type: string
            example: de-DE
          default:
            description: Indicates whether locale is the default locale. If set to true, the previous default locale the project is no longer the default locale.
            type: boolean
            example:
          main:
            description: Indicates whether locale is a main locale. Main locales are part of the [Verification System](https://support.phrase.com/hc/en-us/articles/5784094755484) feature.
            type: boolean
            example:
          rtl:
            description: Indicates whether locale is a RTL (Right-to-Left) locale.
            type: boolean
            example:
          source_locale_id:
            description: Source locale. Can be the name or id of the locale. Preferred is id.
            type: string
            example: abcd1234abcd1234abcd1234abcd1234
          fallback_locale_id:
            description: Fallback locale for empty translations. Can be a locale name or id.
            type: string
            example: abcd1234abcd1234abcd1234abcd1234
          unverify_new_translations:
            description: >
              When true, new translations for this locale are automatically
              marked as unverified. Requires the advanced_workflows plan feature;
              sending true without the feature returns 403.
            type: boolean
            example:
          unverify_updated_translations:
            description: >
              When true, translations are automatically unverified when their
              content changes. Requires the advanced_workflows plan feature;
              sending true without the feature returns 403.
            type: boolean
            example:
          unverify_on_source_changes:
            description: >
              When true, translations are automatically unverified when the
              corresponding source locale translation changes. Requires
              source_locale_id to be set; validation fails if source_locale_id
              is absent.
            type: boolean
            example:
          language_ai_profile:
            description: Language AI profile to assign to this locale.
            type: string
            example:
x-cli-version: '2.5'
