---
summary: Update a term base
description: 'Update an existing term base (previously: glossary).'
operationId: glossary/update
tags:
- Glossaries
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/account_id"
- "$ref": "../../parameters.yaml#/id"
responses:
  '200':
    description: OK
    content:
      application/json:
        schema:
          "$ref": "../../schemas/glossary.yaml#/glossary"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the requesting user is not allowed to update this glossary, when the account does not have the Glossary feature, or when `space_ids` are supplied without the Spaces feature.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/accounts/:account_id/glossaries/:id" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X PATCH \
      -d '{"name":"My glossary","project_ids":"abcd1234abcd1234abcd1234,abcd1234abcd1234abcd1235","space_ids":["abcd1234abcd1234abcd1234","abcd1234abcd1234abcd1235"]}' \
      -H 'Content-Type: application/json'
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: glossary/update/parameters
        properties:
          name:
            description: Name of the glossary
            type: string
            example: My glossary
          project_ids:
            description: List of project ids the glossary should be assigned to.
            type: string
            example: abcd1234abcd1234abcd1234,abcd1234abcd1234abcd1235
          space_ids:
            description: List of space ids the glossary should be assigned to.
            type: array
            items:
              type: string
            example:
            - abcd1234abcd1234abcd1234
            - abcd1234abcd1234abcd1235
x-cli-command: glossaries update
x-cli-version: '2.5'
