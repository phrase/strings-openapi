---
summary: Create a term
description: 'Create a new term in a term base (previously: glossary).'
operationId: glossary_term/create
tags:
- Glossary Terms
parameters:
- "$ref": "../../parameters.yaml#/X-PhraseApp-OTP"
- "$ref": "../../parameters.yaml#/account_id"
- "$ref": "../../parameters.yaml#/glossary_id"
responses:
  '201':
    description: Created
    content:
      application/json:
        schema:
          "$ref": "../../schemas/glossary_term.yaml#/glossary_term"
    headers:
      X-Rate-Limit-Limit:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Limit"
      X-Rate-Limit-Remaining:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Remaining"
      X-Rate-Limit-Reset:
        "$ref": "../../headers.yaml#/X-Rate-Limit-Reset"
  '400':
    "$ref": "../../responses.yaml#/400"
  '404':
    "$ref": "../../responses.yaml#/404"
  '401':
    "$ref": "../../responses.yaml#/401"
  '403':
    "$ref": "../../responses.yaml#/403"
    description: Forbidden. Returned when the access token lacks the `write` scope, when the requesting user is not allowed to create glossary terms in this glossary, or when the account does not have the Glossary feature.
  '422':
    "$ref": "../../responses.yaml#/422"
  '429':
    "$ref": "../../responses.yaml#/429"
x-code-samples:
- lang: Curl
  source: |-
    curl "https://api.phrase.com/v2/accounts/:account_id/glossaries/:glossary_id/terms" \
      -u USERNAME_OR_ACCESS_TOKEN \
      -X POST \
      -d '{"term":"MyCompany","description":"Use this when refering to our company","translatable":true,"case_sensitive":true}' \
      -H 'Content-Type: application/json'
- "$ref": "../../examples/cli.yaml#/GlossaryTermCreate"
requestBody:
  required: true
  content:
    application/json:
      schema:
        type: object
        title: glossary_term/create/parameters
        required:
          - term
        properties:
          term:
            description: Glossary term
            type: string
            example: MyCompany
          description:
            description: Description of term
            type: string
            example: Use this when refering to our company
          translatable:
            description: Indicates whether the term should be used for all languages or can be translated
            type: boolean
            example: true
          case_sensitive:
            description: Indicates whether the term is case sensitive
            type: boolean
            example: true
x-cli-command: glossary_terms create
x-cli-version: '2.5'
